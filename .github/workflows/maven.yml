name: Build and Deploy Goraku API

on:
  push:
    branches:
      - master # 또는 main (사용하시는 브랜치명에 맞게 수정하세요)

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: 소스 체크아웃
        uses: actions/checkout@v4

      - name: GHCR 로그인
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker 메타데이터 추출
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest

      - name: 이미지 빌드 및 push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: SSH로 서버 배포
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          script: |
            # 1. 서버의 배포 대상 폴더로 이동 (dolimban -> goraku-api 로 변경)
            cd ${{ secrets.DEPLOY_ROOT_PATH }}/goraku-api
            
            # 2. GHCR 로그인 (서버에서 이미지를 pull 받기 위함)
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # 3. 최신 이미지 Pull 및 컨테이너 재실행
            docker compose pull
            docker compose up -d --no-build
            
            # 4. 사용하지 않는 구버전 이미지(dangling) 삭제하여 용량 확보
            docker image prune -f